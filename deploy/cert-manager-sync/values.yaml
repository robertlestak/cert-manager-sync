# Default values for cert-manager-sync.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: robertlestak/cert-manager-sync
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

config:
  operatorName: cert-manager-sync.lestak.sh
  secretsNamespace: ""
  disabledNamespaces: ""
  enabledNamespaces: ""
  logLevel: "info"
  logFormat: "json"
  disableCache: "false"
  # Cluster-wide default for cleaning up remote certs on secret deletion.
  # "retain" (default) leaves remote state untouched. "delete" enables cleanup
  # for every watched secret unless the per-secret delete-policy annotation
  # opts back out. See README "Cleaning up remote certificates on secret deletion".
  deletePolicy: "retain"
  # Maximum failed delete attempts before the operator gives up. 0 = retry forever.
  maxDeleteAttempts: "10"
  # When "true" (default), finalizers are never force-removed on persistent
  # delete failure — secret deletion blocks until the controller succeeds
  # (Kubernetes-idiomatic finalizer behavior). When "false", the finalizer is
  # force-removed after maxDeleteAttempts so a misconfigured store cannot wedge
  # a secret; the remote certificate may then need manual cleanup.
  deleteBlocking: "true"

metrics:
  enabled: false
  port: 9090

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  #    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME
  #    iam.gke.io/gcp-service-account: GSA_NAME@PROJECT_ID.iam.gserviceaccount.com
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

clusterRole:
  create: true

podAnnotations: {}

# -- Priority class name for pod scheduling
priorityClassName: ""

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# additional env vars to be passed to the container
env: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget configuration
podDisruptionBudget:
  # -- Enable PodDisruptionBudget
  enabled: false
  # -- Minimum number of pods that must be available
  minAvailable: 1
  # -- Maximum number of pods that can be unavailable (alternative to minAvailable)
  maxUnavailable: ""

nodeSelector: {}

tolerations: []

# -- Topology spread constraints for pod distribution
topologySpreadConstraints: []

affinity: {}
